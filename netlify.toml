# Mondial Pulse 2026 — Netlify configuration
# Static single-page deployment. No build step is required.

[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/news"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/breves"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/brèves"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/suisse"
  to = "/index.html?team=switzerland&v=1312"
  status = 302

[[redirects]]
  from = "/switzerland"
  to = "/index.html?team=switzerland&v=1312"
  status = 302

[[redirects]]
  from = "/argentine"
  to = "/index.html?team=argentina&v=1312"
  status = 302

[[redirects]]
  from = "/argentina"
  to = "/index.html?team=argentina&v=1312"
  status = 302

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
