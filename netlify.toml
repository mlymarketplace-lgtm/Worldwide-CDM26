# Fallback SPA : toute URL inconnue sert index.html, puis le bridge JS normalise si c'est un pays.
[[redirects]]
  from = "/team/:slug"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/teams/:slug"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/equipe/:slug"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/equipes/:slug"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
