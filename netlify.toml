[build]
  publish = "."


[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"

[[headers]]
  for = "/live.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"


[[headers]]
  for = "/stats.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"


[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Bundle applicatif v10 : pas de cache long. Ces fichiers pilotent la home,
# les badges et le routing, et changent souvent — on privilégie la fraîcheur
# systématique (même régime que /data/*) plutôt qu'un gain de cache.
[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/.netlify/functions/scores"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"


# V13.0.7 URL compatibility redirects — anciens liens partagés
# Les liens directs /bresil, /algerie, /team/france, etc. ne doivent jamais tomber en 404.
